openapi: "3.0.3"
info:
  title: ScreenSpace API
  version: "1.0.0"

servers:
  - url: /api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    PaginatedMeta:
      type: object
      required: [total, limit, offset]
      properties:
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    User:
      type: object
      required: [id, email, role, banned, created_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"
        banned:
          type: boolean
        created_at:
          type: string
          format: date-time

    UserRole:
      type: string
      enum: [user, admin]

    Wallpaper:
      type: object
      required: [id, title, uploader_id, status, tags, resolution, width, height, duration, file_size, format, download_count, storage_key, thumbnail_url, preview_url, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        uploader_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/WallpaperStatus"
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        resolution:
          type: string
        width:
          type: integer
        height:
          type: integer
        duration:
          type: number
          format: double
        file_size:
          type: integer
          format: int64
        format:
          type: string
        download_count:
          type: integer
          format: int64
        storage_key:
          type: string
        thumbnail_url:
          type: string
        preview_url:
          type: string
        rejection_reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WallpaperStatus:
      type: string
      enum: [pending, pending_review, approved, rejected]

    WallpaperCategory:
      type: string
      enum: [nature, abstract, urban, cinematic, space, underwater, minimal, other]

    Report:
      type: object
      required: [id, wallpaper_id, reporter_id, reason, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        wallpaper_id:
          type: string
          format: uuid
        reporter_id:
          type: string
          format: uuid
        reason:
          type: string
        status:
          type: string
        created_at:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, role]
      properties:
        token:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    MeResponse:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        role:
          $ref: "#/components/schemas/UserRole"

    CreateWallpaperRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          maxLength: 255
        category:
          $ref: "#/components/schemas/WallpaperCategory"
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 10

    CreateWallpaperResponse:
      type: object
      required: [id, upload_url]
      properties:
        id:
          type: string
          format: uuid
        upload_url:
          type: string

    ReportRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          maxLength: 500

    RejectRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    EditWallpaperRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        category:
          $ref: "#/components/schemas/WallpaperCategory"
        tags:
          type: array
          items:
            type: string
            maxLength: 50
          maxItems: 10

    WallpaperListResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Wallpaper"

    UserListResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/User"

    ReportListResponse:
      allOf:
        - $ref: "#/components/schemas/PaginatedMeta"
        - type: object
          required: [items]
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/Report"

    CategoryListResponse:
      type: object
      required: [categories]
      properties:
        categories:
          type: array
          items:
            $ref: "#/components/schemas/WallpaperCategory"

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        db:
          type: string
        uptime:
          type: string

paths:
  /health:
    get:
      operationId: GetHealth
      summary: Health check
      tags: [system]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /categories:
    get:
      operationId: ListCategories
      summary: List all categories
      tags: [wallpapers]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryListResponse"

  /wallpapers:
    get:
      operationId: ListWallpapers
      summary: List approved wallpapers
      tags: [wallpapers]
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, popular]
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/WallpaperCategory"
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WallpaperListResponse"
    post:
      operationId: CreateWallpaper
      summary: Initiate wallpaper upload
      tags: [wallpapers]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWallpaperRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWallpaperResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /wallpapers/popular:
    get:
      operationId: ListWallpapersPopular
      summary: List wallpapers by popularity
      tags: [wallpapers]
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/WallpaperCategory"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WallpaperListResponse"

  /wallpapers/recent:
    get:
      operationId: ListWallpapersRecent
      summary: List wallpapers by recency
      tags: [wallpapers]
      parameters:
        - name: category
          in: query
          schema:
            $ref: "#/components/schemas/WallpaperCategory"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WallpaperListResponse"

  /wallpapers/{id}:
    get:
      operationId: GetWallpaper
      summary: Get a single wallpaper
      tags: [wallpapers]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallpaper"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /wallpapers/{id}/download:
    post:
      operationId: DownloadWallpaper
      summary: Increment download count and get download URL
      tags: [wallpapers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties:
                  url:
                    type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /wallpapers/{id}/favorite:
    post:
      operationId: ToggleFavorite
      summary: Toggle wallpaper favorite
      tags: [favorites]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [favorited]
                properties:
                  favorited:
                    type: boolean
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /wallpapers/{id}/report:
    post:
      operationId: ReportWallpaper
      summary: Report a wallpaper
      tags: [reports]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "201":
          description: Created
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /wallpapers/{id}/finalize:
    post:
      operationId: FinalizeWallpaper
      summary: Finalize wallpaper upload and trigger processing
      tags: [wallpapers]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallpaper"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register:
    post:
      operationId: Register
      summary: Register a new user
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      operationId: Login
      summary: Login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/me:
    get:
      operationId: GetMe
      summary: Get current user
      tags: [auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /me/favorites:
    get:
      operationId: ListFavorites
      summary: List current user's favorited wallpapers
      tags: [favorites]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WallpaperListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/queue:
    get:
      operationId: GetAdminQueue
      summary: List wallpapers pending review
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WallpaperListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/queue/{id}/approve:
    post:
      operationId: ApproveWallpaper
      summary: Approve a wallpaper
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallpaper"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/queue/{id}/reject:
    post:
      operationId: RejectWallpaper
      summary: Reject a wallpaper
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallpaper"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/wallpapers:
    get:
      operationId: AdminListWallpapers
      summary: Admin list all wallpapers
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/WallpaperStatus"
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WallpaperListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/wallpapers/{id}:
    patch:
      operationId: AdminEditWallpaper
      summary: Edit wallpaper metadata
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EditWallpaperRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Wallpaper"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users:
    get:
      operationId: AdminListUsers
      summary: Admin list all users
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users/{id}/ban:
    post:
      operationId: BanUser
      summary: Ban a user
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users/{id}/unban:
    post:
      operationId: UnbanUser
      summary: Unban a user
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/users/{id}/promote:
    post:
      operationId: PromoteUser
      summary: Promote a user to admin
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request (e.g. user is banned)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/reports:
    get:
      operationId: AdminListReports
      summary: Admin list pending reports
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/reports/{id}/dismiss:
    post:
      operationId: DismissReport
      summary: Dismiss a report
      tags: [admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

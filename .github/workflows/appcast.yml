name: Sparkle Appcast

on:
  release:
    types: [published]

jobs:
  appcast:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Download release assets
        run: gh release download ${{ github.event.release.tag_name }} -D release-assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate appcast
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_EDDSA_KEY }}
        run: |
          brew install sparkle
          echo "$SPARKLE_KEY" > sparkle_key
          generate_appcast --ed-key-file sparkle_key --download-url-prefix "https://github.com/0x63616c/screenspace/releases/download/${{ github.event.release.tag_name }}/" release-assets
          rm sparkle_key
      - name: Upload appcast
        run: gh release upload ${{ github.event.release.tag_name }} release-assets/appcast.xml --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
